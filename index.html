<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Essence Deluxe | Perfumería Premium</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            playfair: ['Playfair Display', 'serif'],
            nunito: ['Nunito', 'sans-serif'],
          },
          colors: {
            primario: '#0a0a0a', // Negro Mate
            secundario: '#ffffff', // Blanco
            acento: '#c5a059',    // Dorado Elegante
            acentoSuave: '#e5d5b7',
          }
        }
      }
    }
  </script>

  <style>
    /* Estilo suave para el scroll de categorías */
    #categorias::-webkit-scrollbar { display: none; }
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(197, 160, 89, 0.1);
    }
  </style>
</head>

<body class="bg-primario text-white font-nunito">

  <div class="max-w-5xl mx-auto">

    <section class="text-center pt-12 pb-8 px-6 flex flex-col items-center">
      <div class="w-24 h-24 rounded-full overflow-hidden border border-acento/30 p-1 mb-4">
        <div class="w-full h-full rounded-full bg-gradient-to-br from-acento to-primario flex items-center justify-center">
          <span class="font-playfair text-2xl text-white">ED</span>
        </div>
      </div>

      <h1 class="font-playfair text-4xl font-bold tracking-tight text-white uppercase">
        Essence <span class="text-acento">Deluxe</span>
      </h1>
      <p class="text-[10px] text-acentoSuave/60 mt-2 uppercase tracking-[4px]">
        Luxury Fragrance House
      </p>
    </section>

    <div class="px-5 -mt-2">
      <div class="flex items-center gap-3 bg-white/5 border border-white/10 rounded-none px-5 py-4 focus-within:border-acento/50 transition-all">
        <i class="fa fa-search text-acento/40"></i>
        <input id="buscador"
          placeholder="Buscar fragancias, marcas..."
          class="flex-1 bg-transparent outline-none text-white placeholder-white/20 text-sm font-light">
      </div>
    </div>

    <div id="categorias" class="flex gap-4 overflow-x-auto px-5 mt-8 pb-2">
      </div>

    <div id="productos" class="px-5 mt-6 mb-32">
      </div>

    <footer class="bg-black/50 border-t border-white/5 px-6 py-12 text-center">
      <h2 class="font-playfair text-2xl text-acento mb-2">Essence Deluxe</h2>
      <p class="text-white/40 text-xs mb-8">Elegancia embotellada.</p>
      
      <div class="flex justify-center gap-8 mb-10">
        <a href="#" class="text-acento/60 hover:text-acento transition-colors"><i class="fab fa-instagram text-xl"></i></a>
        <a href="#" class="text-acento/60 hover:text-acento transition-colors"><i class="fab fa-whatsapp text-xl"></i></a>
      </div>

      <div class="border-t border-white/5 pt-6 text-[10px] text-white/20 tracking-widest uppercase">
        Developed by <span class="text-acento/60 font-bold">BC Studio</span>
      </div>
    </footer>

    <button onclick="abrirCarrito()" id="btnCarrito"
      class="fixed bottom-6 right-6 bg-acento text-primario font-bold flex items-center gap-3 px-6 py-4 rounded-none shadow-[0_10px_20px_rgba(0,0,0,0.5)] active:scale-95 transition-all">
      <i class="fa-solid fa-shopping-bag text-lg"></i>
      <span id="contador" class="bg-primario text-acento text-[10px] px-2 py-0.5 rounded-full">0</span>
    </button>

    <div id="modalCarrito" class="hidden fixed inset-0 bg-black/90 z-50 flex items-end justify-center">
      <div class="bg-primario border-t border-acento/20 w-full md:max-w-[500px] p-8 max-h-[85vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
          <h2 class="font-playfair text-2xl text-acento">Bolsa de Compras</h2>
          <button onclick="cerrarCarrito()" class="text-white/50 hover:text-white">✕</button>
        </div>
        <div id="listaCarrito"></div>
        <div class="flex justify-between mt-8 font-bold text-xl border-t border-white/10 pt-6">
          <span class="font-playfair">Total</span>
          <span id="totalCarrito" class="text-acento"></span>
        </div>
        <button onclick="cerrarCarritoYFormulario()"
          class="mt-8 w-full bg-acento text-primario py-4 font-bold uppercase tracking-widest hover:bg-acentoSuave transition-colors">
          Continuar Pedido
        </button>
      </div>
    </div>

    <div id="modalOpciones" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center px-4">
      <div class="bg-primario border border-acento/30 p-8 w-full max-w-sm text-center">
        <h2 id="modalTitulo" class="font-playfair text-2xl mb-2 text-white">Nombre Perfume</h2>
        <p id="modalDesc" class="text-white/40 text-xs mb-6 uppercase tracking-widest">Eau de Parfum</p>
        
        <div id="contenedorOpciones" class="flex flex-col gap-3">
          </div>

        <button onclick="cerrarModalOpciones()" class="mt-6 text-[10px] text-white/30 uppercase tracking-widest hover:text-acento">Cerrar</button>
      </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/95 z-[300] flex items-center justify-center px-4">
      <div class="bg-primario border border-acento/20 p-8 w-full max-w-sm">
        <h2 class="font-playfair text-2xl text-acento mb-6 text-center">Finalizar Compra</h2>
        
        <div class="space-y-4">
          <input id="nombre" placeholder="Nombre" class="w-full bg-white/5 border border-white/10 px-4 py-3 text-sm outline-none focus:border-acento/50 text-white">
          <input id="apellido" placeholder="Apellido" class="w-full bg-white/5 border border-white/10 px-4 py-3 text-sm outline-none focus:border-acento/50 text-white">
          
          <select id="tipo" onchange="toggleDelivery()" class="w-full bg-white/5 border border-white/10 px-4 py-3 text-sm outline-none focus:border-acento/50 text-white/60">
            <option value="Delivery" class="bg-primario">Envío a Domicilio</option>
            <option value="Retiro" class="bg-primario">Retiro en Boutique</option>
          </select>

          <div id="seccionDelivery">
            <input id="direccion" placeholder="Dirección de entrega" class="w-full bg-white/5 border border-white/10 px-4 py-3 text-sm outline-none focus:border-acento/50 text-white mb-4">
            <select id="zona" class="w-full bg-white/5 border border-white/10 px-4 py-3 text-sm outline-none focus:border-acento/50 text-white/60"></select>
          </div>

          <div id="metodosPago" class="border border-white/10 p-4 mt-4">
            <p class="text-[10px] text-acento/50 uppercase tracking-widest mb-3">Forma de Pago</p>
            <div id="listaPagos" class="space-y-2"></div>
          </div>

          <button onclick="enviarPedido()" class="w-full bg-acento text-primario font-bold py-4 mt-4 uppercase tracking-tighter flex items-center justify-center gap-2">
            Confirmar por WhatsApp
          </button>
        </div>
      </div>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
