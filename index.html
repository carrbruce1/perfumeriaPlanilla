<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Essence Deluxe | Boutique de Fragancias</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            playfair: ['Playfair Display', 'serif'],
            nunito: ['Nunito', 'sans-serif'],
          },
          colors: {
            primario: '#0a0a0a',
            secundario: '#ffffff',
            acento: '#c5a059',
            acentoSuave: '#e5d5b7',
          }
        }
      }
    }
  </script>

  <style>
    html { scroll-behavior: smooth; }
    #categorias::-webkit-scrollbar { display: none; }
    
    .hero-gradient {
      background: linear-gradient(to bottom, rgba(10,10,10,0.5), rgba(10,10,10,1)), 
                  url('https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?q=80&w=2000&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
    }
    
    .nav-blur {
      backdrop-filter: blur(15px);
      background: rgba(10, 10, 10, 0.8);
    }

    /* Evita que el catálogo quede pegado al nav al scrollear */
    #catalogo-seccion { scroll-margin-top: 64px; }
  </style>
</head>

<body class="bg-primario text-white font-nunito">

  <nav class="nav-blur fixed top-0 w-full z-[100] border-b border-white/5">
    <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
      <div class="font-playfair text-xl tracking-[4px] font-black uppercase">
        ESSENCE<span class="text-acento">DELUXE</span>
      </div>
      <div class="flex gap-6 items-center">
        <button onclick="abrirCarrito()" class="relative group">
          <i class="fa-solid fa-shopping-bag text-lg text-acento group-hover:scale-110 transition-transform"></i>
          <span id="contador" class="absolute -top-2 -right-2 bg-white text-primario text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center">0</span>
        </button>
      </div>
    </div>
  </nav>

  <section class="hero-gradient min-h-[90vh] flex items-center justify-center text-center px-6 pt-20">
    <div class="max-w-3xl">
      <span class="text-acento text-[10px] uppercase tracking-[5px] mb-6 block animate-pulse">New Collection 2026</span>
      <h1 class="font-playfair text-6xl md:text-8xl font-bold mb-8 leading-tight">
        El Arte de la <br> <span class="italic text-acentoSuave">Seducción</span>
      </h1>
      <p class="text-white/60 text-sm md:text-lg font-light tracking-[2px] max-w-md mx-auto mb-12">
        Explorá nuestra curaduría de fragancias exclusivas diseñadas para dejar una huella inolvidable.
      </p>
      <a href="#catalogo-seccion" class="inline-block border border-acento text-acento px-10 py-4 text-[11px] uppercase tracking-[3px] hover:bg-acento hover:text-primario transition-all duration-500 shadow-2xl">
        Descubrir Catálogo
      </a>
    </div>
  </section>

  <div id="catalogo-seccion" class="py-20 bg-primario relative z-10">
    
    <div class="text-center mb-16">
        <h2 class="font-playfair text-4xl text-white uppercase tracking-widest">Nuestra Selección</h2>
        <div class="w-16 h-[1px] bg-acento mx-auto mt-4"></div>
    </div>

    <main class="max-w-7xl mx-auto px-6">
      
      <div class="bg-[#111]/90 backdrop-blur-md border border-white/10 p-2 mb-16 sticky top-20 z-50 shadow-2xl">
        <div class="flex flex-col md:flex-row gap-4">
          <div class="flex-1 flex items-center gap-3 px-4 py-4 border-b md:border-b-0 md:border-r border-white/5">
            <i class="fa fa-search text-acento/50 text-sm"></i>
            <input id="buscador" type="text" placeholder="¿Qué aroma buscas hoy?..." 
                   class="bg-transparent outline-none text-sm w-full placeholder-white/20 text-white">
          </div>
          <div id="categorias" class="flex gap-8 items-center px-6 py-4 overflow-x-auto whitespace-nowrap">
            </div>
        </div>
      </div>

      <div id="productos" class="mb-32">
        </div>

    </main>
  </div>

  <footer class="bg-black py-24 border-t border-white/5 text-center">
    <div class="font-playfair text-3xl mb-6 tracking-[8px] uppercase">ESSENCE</div>
    <div class="flex justify-center gap-8 mb-12 text-white/30">
      <a href="#" class="hover:text-acento transition-colors"><i class="fab fa-instagram text-xl"></i></a>
      <a href="#" class="hover:text-acento transition-colors"><i class="fab fa-facebook-f text-lg"></i></a>
      <a href="#" class="hover:text-acento transition-colors"><i class="fab fa-whatsapp text-xl"></i></a>
    </div>
    <p class="text-[10px] text-white/20 tracking-[4px] uppercase">
      © 2026 Crafted by <span class="text-white/40 font-bold">BC Studio</span>
    </p>
  </footer>

  <div id="modalOpciones" class="hidden fixed inset-0 bg-black/95 z-[200] flex items-center justify-center px-4">
    <div class="bg-[#0a0a0a] border border-acento/20 p-10 w-full max-w-md text-center shadow-[0_0_50px_rgba(197,160,89,0.1)]">
      <h2 id="modalTitulo" class="font-playfair text-3xl mb-2 text-white"></h2>
      <p class="text-acento text-[10px] tracking-[4px] uppercase mb-8">Seleccione Presentación</p>
      <div id="contenedorOpciones" class="space-y-4"></div>
      <button onclick="cerrarModalOpciones()" class="mt-10 text-white/20 text-[10px] uppercase tracking-[3px] hover:text-white transition-colors">Regresar</button>
    </div>
  </div>

  <div id="modalCarrito" class="hidden fixed inset-0 bg-black/98 z-[200] flex justify-end">
    <div class="bg-primario w-full max-w-md border-l border-white/5 p-10 flex flex-col shadow-2xl">
      <div class="flex justify-between items-center mb-10">
        <h2 class="font-playfair text-2xl uppercase tracking-widest">Tu Selección</h2>
        <button onclick="cerrarCarrito()" class="text-acento hover:scale-110 transition-transform">✕</button>
      </div>
      <div id="listaCarrito" class="flex-1 overflow-y-auto pr-2"></div>
      <div class="pt-6 border-t border-white/5 mt-auto">
        <div class="flex justify-between text-xl font-playfair mb-8">
          <span class="text-white/60">Subtotal</span>
          <span id="totalCarrito" class="text-acento"></span>
        </div>
        <button onclick="cerrarCarritoYFormulario()" class="w-full bg-white text-primario font-bold py-5 uppercase tracking-[3px] hover:bg-acento transition-all duration-300">
          Checkout
        </button>
      </div>
    </div>
  </div>

  <div id="modal" class="hidden fixed inset-0 bg-black/95 z-[300] flex items-center justify-center px-4">
    <div class="bg-primario border border-white/10 p-8 w-full max-w-md shadow-2xl">
      <h2 class="font-playfair text-2xl mb-8 text-center uppercase tracking-widest">Finalizar Compra</h2>
      <div class="space-y-5">
        <input id="nombre" type="text" placeholder="Nombre completo" class="w-full bg-white/5 border border-white/10 px-4 py-4 text-sm outline-none focus:border-acento transition-colors text-white">
        <select id="tipo" onchange="toggleDelivery()" class="w-full bg-white/5 border border-white/10 px-4 py-4 text-sm outline-none text-white/60">
          <option value="Delivery">Envío a Domicilio</option>
          <option value="Retiro">Pick up Boutique</option>
        </select>
        <div id="seccionDelivery" class="space-y-5">
          <input id="direccion" type="text" placeholder="Calle y número" class="w-full bg-white/5 border border-white/10 px-4 py-4 text-sm outline-none focus:border-acento text-white">
          <select id="zona" class="w-full bg-white/5 border border-white/10 px-4 py-4 text-sm outline-none text-white/60"></select>
        </div>
        <div id="listaPagos" class="py-4 border-t border-white/5"></div>
        <button onclick="enviarPedido()" class="w-full bg-acento text-primario font-bold py-5 uppercase tracking-[2px] hover:brightness-110 transition-all">
          <i class="fab fa-whatsapp mr-2"></i> Confirmar Pedido
        </button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
